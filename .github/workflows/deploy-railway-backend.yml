name: Deploy Railway Backend

on:
  push:
    branches:
      - model-performance-auth-netlify

permissions:
  contents: read

concurrency:
  group: railway-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: railway up --service backend --environment production --project 622725e1-a95d-4f45-b05b-0652ee489c74 --detach
